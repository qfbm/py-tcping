<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - TCPING Monitor</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background: #f4f7fb;
      color: #1f2a37;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    .login-card {
      width: min(420px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    p {
      margin: 0 0 24px;
      color: #667085;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #667085;
      font-size: 13px;
    }

    input {
      width: 100%;
      height: 42px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 0 12px;
      color: #1f2a37;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    button {
      width: 100%;
      height: 42px;
      margin-top: 16px;
      border: 0;
      border-radius: 6px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
    }

    .error {
      margin-top: 12px;
      color: #ff4d4f;
      font-size: 13px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>TCPING Monitor</h1>
    <p>请输入访问密码</p>
    <form method="post">
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
      <button type="submit">进入</button>
      <div class="error">{{ error }}</div>
    </form>
  </main>
</body>
</html>
